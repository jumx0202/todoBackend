spring:
  application:
    name: todoBackend
  datasource:
    url: jdbc:sqlite:./data/todo.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
server:
  port: 8080
jwt:
  secret: TodoListSecretKeyForJWTToken2026VeryLongAndSecure
  expiration: 86400000
logging:
  level:
    com.example.todobackend: INFO
    org.hibernate.SQL: DEBUG
